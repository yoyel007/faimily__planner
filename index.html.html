<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 행사 플래너 (Family Event Planner)</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fdf2f2;
        }
        
        .event-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.4s ease-out forwards;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .event-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .d-day-badge {
            min-width: 70px;
            text-align: center;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #fda4af;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4 flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col h-[85vh]">
        <!-- Header -->
        <div class="bg-rose-400 p-8 text-white text-center shrink-0">
            <h1 class="text-3xl font-extrabold mb-1 tracking-tight">👨‍👩‍👧‍👦 우리 가족 플래너</h1>
            <p class="text-rose-100 text-sm opacity-90">소중한 순간들을 기록하고 기억하세요</p>
        </div>

        <!-- Input Section -->
        <div class="p-6 bg-rose-50 border-b border-rose-100 shrink-0">
            <div class="space-y-3">
                <input type="text" id="eventTitle" placeholder="행사 이름 (예: 할머니 팔순 잔치)" 
                    class="w-full px-5 py-3 rounded-2xl border-none focus:ring-2 focus:ring-rose-400 outline-none shadow-inner text-gray-700 transition-all">
                
                <div class="flex gap-2">
                    <input type="date" id="eventDate" 
                        class="flex-1 px-5 py-3 rounded-2xl border-none focus:ring-2 focus:ring-rose-400 outline-none shadow-inner text-gray-600 transition-all">
                    
                    <select id="eventType" class="px-4 py-3 rounded-2xl border-none focus:ring-2 focus:ring-rose-400 outline-none shadow-inner text-gray-600 appearance-none bg-white cursor-pointer">
                        <option value="🎂">🎂 생일</option>
                        <option value="🏠">🏠 모임</option>
                        <option value="✈️">✈️ 여행</option>
                        <option value="🎁">🎁 기념일</option>
                        <option value="📅">📅 기타</option>
                    </select>
                </div>

                <button onclick="handleAddEvent()" 
                    class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg active:transform active:scale-95 uppercase tracking-wider">
                    새 행사 추가하기
                </button>
            </div>
        </div>

        <!-- Event List Section -->
        <div class="p-6 overflow-y-auto flex-grow">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">일정 목록</h2>
                <span id="eventCount" class="text-sm bg-rose-500 text-white px-3 py-1 rounded-full font-bold shadow-sm">0개</span>
            </div>
            
            <ul id="eventList" class="space-y-4">
                <!-- Events will be injected here -->
            </ul>

            <!-- Empty State -->
            <div id="emptyState" class="text-center py-16">
                <div class="text-5xl mb-4 opacity-20">📝</div>
                <p class="text-gray-400 font-medium">등록된 가족 행사가 없습니다.<br><span class="text-xs">상단의 입력창을 이용해 추가해보세요!</span></p>
            </div>
        </div>
    </div>

    <script>
        let events = JSON.parse(localStorage.getItem('familyEvents')) || [];

        // DOM Elements
        const eventList = document.getElementById('eventList');
        const eventCountLabel = document.getElementById('eventCount');
        const emptyState = document.getElementById('emptyState');
        const titleInput = document.getElementById('eventTitle');
        const dateInput = document.getElementById('eventDate');
        const typeInput = document.getElementById('eventType');

        // Set default date to today
        dateInput.valueAsDate = new Date();

        // Listen for Enter key
        titleInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAddEvent();
        });

        /**
         * Calculate D-Day
         */
        function calculateDDay(dateString) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const targetDate = new Date(dateString);
            targetDate.setHours(0, 0, 0, 0);
            
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return "오늘";
            if (diffDays > 0) return `D-${diffDays}`;
            return `D+${Math.abs(diffDays)}`;
        }

        /**
         * Save to LocalStorage and Render
         */
        function saveData() {
            // Sort by date (ascending)
            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('familyEvents', JSON.stringify(events));
            renderEvents();
        }

        /**
         * Render the entire list
         */
        function renderEvents() {
            eventList.innerHTML = '';
            events.forEach((ev, index) => {
                const dDayText = calculateDDay(ev.date);
                const isUpcoming = !dDayText.includes('+') && dDayText !== '오늘';
                const isToday = dDayText === '오늘';

                const li = document.createElement('li');
                li.className = 'event-card flex items-center justify-between p-5 bg-white border border-rose-50 rounded-[1.5rem] shadow-sm hover:border-rose-200';
                
                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-3xl filter drop-shadow-sm">${ev.type}</div>
                        <div>
                            <p class="font-bold text-gray-800 text-lg leading-tight">${ev.title}</p>
                            <p class="text-xs font-medium text-gray-400 mt-1">${ev.date.replace(/-/g, '. ')}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="d-day-badge px-4 py-1.5 rounded-full text-xs font-black tracking-tighter shadow-sm
                            ${isToday ? 'bg-amber-400 text-white' : (isUpcoming ? 'bg-rose-500 text-white' : 'bg-gray-100 text-gray-400')}">
                            ${dDayText.toUpperCase()}
                        </span>
                        <button onclick="deleteEvent(${index})" class="text-gray-300 hover:text-rose-500 transition-colors p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                `;
                eventList.appendChild(li);
            });

            const count = events.length;
            eventCountLabel.textContent = `${count}개`;
            emptyState.style.display = count === 0 ? 'block' : 'none';
        }

        /**
         * Add Event
         */
        function handleAddEvent() {
            const title = titleInput.value.trim();
            const date = dateInput.value;
            const type = typeInput.value;

            if (!title) {
                alert('행사 이름을 입력해주세요!');
                titleInput.focus();
                return;
            }
            if (!date) {
                alert('날짜를 선택해주세요!');
                return;
            }

            events.push({ title, date, type });
            titleInput.value = '';
            dateInput.valueAsDate = new Date(); // Reset to today
            saveData();
        }

        /**
         * Delete Event
         */
        function deleteEvent(index) {
            if (confirm('이 일정을 삭제할까요?')) {
                events.splice(index, 1);
                saveData();
            }
        }

        // Initial Load
        renderEvents();
    </script>
</body>
</html>
